{{define "content"}}
<p><a href="/instances/{{.Instance.Name}}/accounts/{{.Account}}">&larr; account</a></p>
<h2>Password reset</h2>
<table>
  <tr><th>Account</th><td>{{.Account}}</td></tr>
  <tr><th>New password</th><td><code>{{.Password}}</code></td></tr>
</table>
<p class="danger">Share this password securely with the account owner. It will not be shown again.</p>
{{end}}
